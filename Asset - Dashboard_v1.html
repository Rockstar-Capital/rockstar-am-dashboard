<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rockstar Capital - Asset Management Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
    padding: 24px 32px;
    border-bottom: 2px solid #334155;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    color: #f8fafc;
  }
  .header .subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-top: 2px;
  }
  .header-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .btn:hover { background: #2563eb; }
  .btn-secondary { background: #334155; }
  .btn-secondary:hover { background: #475569; }
  .btn-danger { background: #dc2626; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-success { background: #16a34a; }
  .btn-success:hover { background: #15803d; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  .tabs {
    display: flex;
    background: #1e293b;
    padding: 0 32px;
    border-bottom: 1px solid #334155;
    overflow-x: auto;
  }
  .tab {
    padding: 14px 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: #94a3b8;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .tab:hover { color: #e2e8f0; }
  .tab.active { color: #60a5fa; border-bottom-color: #3b82f6; }

  .container { padding: 24px 32px; max-width: 1600px; margin: 0 auto; }

  /* Portfolio Overview */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: #1e293b;
    padding: 20px;
    border-radius: 8px;
    border: 1px solid #334155;
  }
  .stat-label { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-size: 28px; font-weight: 700; color: #f8fafc; margin-top: 6px; }
  .stat-sub { font-size: 12px; color: #64748b; margin-top: 4px; }
  .stat-sub.positive { color: #4ade80; }
  .stat-sub.negative { color: #f87171; }

  .properties-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }
  .property-card {
    background: #1e293b;
    padding: 20px;
    border-radius: 8px;
    border: 1px solid #334155;
    cursor: pointer;
    transition: all 0.15s;
  }
  .property-card:hover { border-color: #3b82f6; transform: translateY(-2px); }
  .property-name { font-size: 18px; font-weight: 600; color: #f8fafc; margin-bottom: 4px; }
  .property-location { font-size: 13px; color: #94a3b8; margin-bottom: 12px; }
  .property-metrics {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid #334155;
  }
  .metric { font-size: 12px; color: #94a3b8; }
  .metric-value { font-size: 15px; color: #f8fafc; font-weight: 600; margin-top: 2px; }
  .property-group {
    display: inline-block;
    padding: 2px 8px;
    background: #1e3a8a;
    color: #93c5fd;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 8px;
  }
  .property-group.alvin { background: #14532d; color: #86efac; }
  .property-group.rosenberg { background: #581c87; color: #d8b4fe; }
  .property-group.humble { background: #7c2d12; color: #fdba74; }
  .property-group.baytown { background: #134e4a; color: #5eead4; }
  .property-group.southtexas { background: #7f1d1d; color: #fca5a5; }
  .property-group.other { background: #334155; color: #cbd5e1; }

  /* Property Detail */
  .back-btn {
    background: none;
    color: #60a5fa;
    border: none;
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 16px;
    padding: 0;
  }
  .property-header {
    background: #1e293b;
    padding: 24px;
    border-radius: 8px;
    margin-bottom: 16px;
    border: 1px solid #334155;
  }
  .property-header h2 {
    font-size: 24px;
    color: #f8fafc;
    margin-bottom: 4px;
  }

  .sub-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: #1e293b;
    padding: 4px;
    border-radius: 8px;
    border: 1px solid #334155;
    overflow-x: auto;
  }
  .sub-tab {
    padding: 8px 16px;
    cursor: pointer;
    font-size: 13px;
    color: #94a3b8;
    border-radius: 6px;
    white-space: nowrap;
  }
  .sub-tab:hover { color: #e2e8f0; }
  .sub-tab.active { background: #334155; color: #f8fafc; }

  .panel {
    background: #1e293b;
    padding: 20px;
    border-radius: 8px;
    border: 1px solid #334155;
    margin-bottom: 16px;
  }
  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .panel-header h3 { font-size: 16px; color: #f8fafc; }

  /* Forms */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
    margin-bottom: 12px;
  }
  .form-group { display: flex; flex-direction: column; }
  .form-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.3px; }
  .form-input, .form-select, .form-textarea {
    background: #0f172a;
    border: 1px solid #334155;
    color: #e2e8f0;
    padding: 8px 12px;
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    outline: none;
    border-color: #3b82f6;
  }
  .form-textarea { resize: vertical; min-height: 60px; }

  /* Tables */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px; background: #0f172a; color: #94a3b8; font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 1px solid #334155; }
  td { padding: 10px; border-bottom: 1px solid #334155; color: #e2e8f0; }
  tr:hover td { background: #0f172a; }
  td input, td select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 4px 8px; border-radius: 4px; font-size: 13px; width: 100%; }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: #64748b;
    font-size: 14px;
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .badge-open { background: #422006; color: #fbbf24; }
  .badge-progress { background: #1e3a8a; color: #93c5fd; }
  .badge-done { background: #14532d; color: #86efac; }
  .badge-overdue { background: #450a0a; color: #fca5a5; }
  .badge-high { background: #450a0a; color: #fca5a5; }
  .badge-med { background: #422006; color: #fbbf24; }
  .badge-low { background: #1e3a8a; color: #93c5fd; }

  .loading { text-align: center; padding: 40px; color: #64748b; }

  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-bar select, .filter-bar input {
    background: #1e293b;
    border: 1px solid #334155;
    color: #e2e8f0;
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 13px;
  }

  .modal-backdrop {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .modal {
    background: #1e293b;
    border-radius: 8px;
    border: 1px solid #334155;
    padding: 24px;
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal h3 { margin-bottom: 16px; color: #f8fafc; }

  .alert {
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 13px;
  }
  .alert-warn { background: #422006; color: #fbbf24; border: 1px solid #92400e; }
  .alert-info { background: #1e3a8a; color: #93c5fd; border: 1px solid #1e40af; }
</style>
</head>

<div class="header">
  <div>
    <h1>Rockstar Capital · Asset Management</h1>
    <div class="subtitle" id="header-subtitle">Loading...</div>
    <div id="save-status" style="font-size: 11px; color: #4ade80; margin-top: 4px;">● Ready</div>
  </div>
  <div style="display: flex; flex-direction: column; align-items: end; gap: 6px;">
    <div style="display: flex; align-items: center; gap: 8px;">
      <label style="font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px;">View as</label>
      <select id="am-filter" onchange="changeAMFilter(this.value)" style="background: #334155; border: 1px solid #475569; color: #f8fafc; padding: 6px 12px; border-radius: 6px; font-size: 14px; font-weight: 500; min-width: 160px;">
        <option value="all">All Asset Managers</option>
      </select>
    </div>
    <div class="header-actions">
    <button class="btn btn-secondary" onclick="exportData()">Export Data</button>
    <button class="btn btn-secondary" onclick="document.getElementById('import-input').click()">Import Data</button>
    <button class="btn btn-secondary" onclick="resetToSeed()" title="Reset all data back to the original T-12 import (DESTRUCTIVE)">Reset to Original</button>
    <input type="file" id="import-input" accept=".json" style="display:none" oninput="importData(event)">
    </div>
  </div>
</div>

<div class="tabs" id="main-tabs">
  <div class="tab active" onclick="switchView('portfolio')">Portfolio Overview</div>
  <div class="tab" onclick="switchView('investment')">Investment Performance</div>
  <div class="tab" onclick="switchView('actions')">Action Items</div>
  <div class="tab" onclick="switchView('walks')">Property Walks</div>
  <div class="tab" onclick="switchView('financials')">Financial Summary</div>
</div>

<div class="container" id="main-content">
  <div class="loading">Loading dashboard...</div>
</div>

// Storage helpers
async function loadData() {
  try {
    // Load saved AM filter preference
    try {
      const filterPref = await _idbGet('amFilter');
      if (filterPref) state.amFilter = filterPref;
    } catch(e) {}
    
    const data = await _idbGet('current');
    if (data) {
      state.properties = JSON.parse(data);
      // Add any missing properties using the full SEED_DATA (includes financials, investment data, etc.)
      // This makes sure if a new property is added to SEED_DATA, existing users get it pre-populated
      let addedAny = false;
      PROPERTIES_INIT.forEach(p => {
        if (!state.properties[p.id]) {
          if (SEED_DATA[p.id]) {
            // Use the rich seed data (financials, occupancy, investment info)
            state.properties[p.id] = JSON.parse(JSON.stringify(SEED_DATA[p.id]));
            addedAny = true;
          } else {
            // Fall back to empty placeholder
            const init = initPropertyData();
            state.properties[p.id] = init[p.id];
            addedAny = true;
          }
        }
      });
      // Apply any pending one-time patches
      await applyPendingPatches();
      // Persist if we added missing properties
      if (addedAny) {
        await _idbSet('current', JSON.stringify(state.properties)).catch(() => {});
      }
    } else {
      // First-ever load — seed
      state.properties = JSON.parse(JSON.stringify(SEED_DATA));
      await _idbSet('current', JSON.stringify(state.properties)).catch(() => {});
    }
  } catch (e) {
    console.error('loadData error:', e);
    state.properties = JSON.parse(JSON.stringify(SEED_DATA));
  }
  state.loading = false;
  render();
  setSaveStatus('saved');
}

// ===== Storage layer using IndexedDB (always available, no rate limits) =====
const DB_NAME = 'RockstarAssetMgmt';
const DB_VERSION = 1;
const STORE_NAME = 'portfolio';
let _db = null;

function _openDB() {
  return new Promise((resolve, reject) => {
    if (_db) { resolve(_db); return; }
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME);
      }
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

async function _idbGet(key) {
  const db = await _openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function _idbSet(key, value) {
  const db = await _openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

let _saveTimer = null;
let _savePending = false;
let _saveInFlight = false;
let _lastError = null;

function setSaveStatus(status, errMsg) {
  const el = document.getElementById('save-status');
  if (!el) return;
  el.style.cursor = 'default';
  el.onclick = null;
  if (status === 'pending') {
    el.textContent = '● Editing...';
    el.style.color = '#94a3b8';
    el.title = 'Will save in 1 second';
  } else if (status === 'saving') {
    el.textContent = '● Saving...';
    el.style.color = '#fbbf24';
  } else if (status === 'saved') {
    el.textContent = '● Saved';
    el.style.color = '#4ade80';
    el.title = 'All changes saved to browser';
  } else if (status === 'error') {
    el.textContent = '● Save Error (click)';
    el.style.color = '#f87171';
    el.style.cursor = 'pointer';
    el.title = errMsg || 'Save failed';
    el.onclick = () => {
      alert('Save error: ' + (errMsg || 'Unknown') + '\n\nYour data is still in memory. Click Export Data NOW to download a backup file.');
      _doSave();
    };
  }
}

function saveData() {
  _savePending = true;
  setSaveStatus('pending');
  if (_saveTimer) clearTimeout(_saveTimer);
  // Short debounce — IndexedDB has no rate limits
  _saveTimer = setTimeout(() => _doSave(), 1000);
}

async function _doSave() {
  if (_saveInFlight) return;
  if (_saveTimer) { clearTimeout(_saveTimer); _saveTimer = null; }
  _saveInFlight = true;
  setSaveStatus('saving');
  try {
    await _idbSet('current', JSON.stringify(state.properties));
    _savePending = false;
    _lastError = null;
    setSaveStatus('saved');
  } catch (e) {
    _lastError = e && e.message ? e.message : String(e);
    console.error('Save failed:', e);
    setSaveStatus('error', _lastError);
    setTimeout(() => { if (_savePending) _doSave(); }, 5000);
  } finally {
    _saveInFlight = false;
  }
}

async function _forceSave() {
  if (!_savePending) return;
  if (_saveTimer) { clearTimeout(_saveTimer); _saveTimer = null; }
  await _doSave();
}

// Listen for events that mean the user might be leaving
window.addEventListener('beforeunload', (e) => {
  if (_savePending) {
    // Try to save synchronously via IndexedDB (fire-and-forget)
    try {
      _idbSet('current', JSON.stringify(state.properties)).catch(() => {});
    } catch (err) {}
    e.preventDefault();
    e.returnValue = 'You have unsaved changes. Are you sure?';
    return e.returnValue;
  }
});

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') _forceSave();
});

window.addEventListener('blur', () => _forceSave());
window.addEventListener('pagehide', () => _forceSave());

// === AM Filter Logic ===
function getAllAMs() {
  const ams = new Set();
  Object.values(state.properties).forEach(p => {
    const am = p.info.assignedTo;
    if (am) ams.add(am);
  });
  return Array.from(ams).sort();
}

function getFilteredProperties() {
  // Returns [id, propertyData] entries filtered by current AM selection
  const all = Object.entries(state.properties);
  if (state.amFilter === 'all') return all;
  return all.filter(([_, p]) => p.info.assignedTo === state.amFilter);
}

function changeAMFilter(value) {
  state.amFilter = value;
  // Persist preference (separate from portfolio data, so reset doesn't clear it)
  try { _idbSet('amFilter', value).catch(() => {}); } catch(e) {}
  state.selectedProperty = null;  // Clear property selection so user lands on filtered overview
  render();
}

function populateAMFilter() {
  const select = document.getElementById('am-filter');
  if (!select) return;
  const ams = getAllAMs();
  // Preserve current selection
  const currentValue = state.amFilter;
  select.innerHTML = '<option value="all">All Asset Managers</option>' +
    ams.map(am => `<option value="${am}">${am}</option>`).join('');
  select.value = currentValue;
}

// Calculate metrics
function calcNOI(financials) {
  if (!financials || financials.length === 0) return null;
  const latest = financials[financials.length - 1];
  return (parseFloat(latest.income) || 0) - (parseFloat(latest.expenses) || 0);
}

function getLatestOccupancy(occupancy) {
  if (!occupancy || occupancy.length === 0) return null;
  return occupancy[occupancy.length - 1];
}

function formatMoney(n) {
  if (n === null || n === undefined || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return '$' + num.toLocaleString('en-US', { maximumFractionDigits: 0 });
}

function formatPct(n) {
  if (n === null || n === undefined || n === '') return '—';
  const num = parseFloat(n);
  if (isNaN(num)) return '—';
  return num.toFixed(1) + '%';
}

// Renders
function render() {
  if (state.loading) {
    document.getElementById('main-content').innerHTML = '<div class="loading">Loading dashboard...</div>';
    return;
  }

  // Populate AM dropdown
  populateAMFilter();

  // Update header subtitle to reflect filter
  const filtered = getFilteredProperties();
  const totalUnits = filtered.reduce((sum, [_, p]) => sum + (parseInt(p.info.units) || 0), 0);
  const propCount = filtered.length;
  const filterLabel = state.amFilter === 'all' ? 'All AMs' : state.amFilter + "'s portfolio";
  document.getElementById('header-subtitle').textContent = `${filterLabel} · ${propCount} properties · ${totalUnits.toLocaleString()} units`;

  // Update active tab
  document.querySelectorAll('#main-tabs .tab').forEach((t, i) => {
    const views = ['portfolio', 'investment', 'actions', 'walks', 'financials'];
    t.classList.toggle('active', views[i] === state.view && !state.selectedProperty);
  });

  if (state.selectedProperty) {
    renderPropertyDetail();
  } else if (state.view === 'portfolio') {
    renderPortfolio();
  } else if (state.view === 'investment') {
    renderInvestment();
  } else if (state.view === 'actions') {
    renderActions();
  } else if (state.view === 'walks') {
    renderWalks();
  } else if (state.view === 'financials') {
    renderFinancials();
  }
}

function renderPortfolio() {
  const props = getFilteredProperties();
  const totalUnits = props.reduce((s, [_, p]) => s + (parseInt(p.info.units) || 0), 0);

  // Aggregate metrics
  let totalNOI = 0;
  let avgOcc = 0;
  let occCount = 0;
  let openActions = 0;
  let overdueActions = 0;
  const today = new Date().toISOString().split('T')[0];

  props.forEach(([_, p]) => {
    const noi = calcNOI(p.financials);
    if (noi !== null) totalNOI += noi;
    const occ = getLatestOccupancy(p.occupancy);
    if (occ && occ.occupancy) { avgOcc += parseFloat(occ.occupancy); occCount++; }
    p.actions.forEach(a => {
      if (a.status !== 'done') {
        openActions++;
        if (a.dueDate && a.dueDate < today) overdueActions++;
      }
    });
  });
  avgOcc = occCount > 0 ? avgOcc / occCount : 0;

  let html = `

      <div class="stat-card">

      <div class="sub-tab ${state.subTab === 'financials' ? 'active' : ''}" onclick="switchSubTab('financials')">Financials</div>
      <div class="sub-tab ${state.subTab === 'occupancy' ? 'active' : ''}" onclick="switchSubTab('occupancy')">Occupancy & Leasing</div>
      <div class="sub-tab ${state.subTab === 'walks' ? 'active' : ''}" onclick="switchSubTab('walks')">Property Walks</div>
      <div class="sub-tab ${state.subTab === 'actions' ? 'active' : ''}" onclick="switchSubTab('actions')">Action Items</div>
    </div>
  `;

  if (state.subTab === 'overview') html += renderOverview(p);
  else if (state.subTab === 'financials') html += renderPropertyFinancials(p);
  else if (state.subTab === 'occupancy') html += renderPropertyOccupancy(p);
  else if (state.subTab === 'walks') html += renderPropertyWalks(p);
  else if (state.subTab === 'actions') html += renderPropertyActions(p);

  document.getElementById('main-content').innerHTML = html;
}

function renderPropertyFinancials(p) {

  `;
  if (p.financials.length === 0) {
    html += '<div class="empty-state">No financial data yet. Click "Add Month" to start tracking income, expenses, and NOI.</div>';
  } else {
    html += `
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Period</th>
              <th>Income</th>
              <th>Expenses</th>
              <th>NOI</th>
              <th>Budget NOI</th>
              <th>Variance</th>
              <th>Notes</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
    `;
    p.financials.slice().reverse().forEach((f, idx) => {
      const realIdx = p.financials.length - 1 - idx;
      const noi = (parseFloat(f.income) || 0) - (parseFloat(f.expenses) || 0);
      const variance = noi - (parseFloat(f.budgetNOI) || 0);
      const varClass = variance >= 0 ? 'positive' : 'negative';
      html += `
        <tr>
          <td><input type="month" value="${f.period}" oninput="updateFinancial(${realIdx}, 'period', this.value)"></td>

  return html;
}

// Investment Performance view
function renderInvestment() {
  const today = new Date();
  let totalPP = 0, totalEq = 0, totalDist = 0, totalNOI = 0, totalLoan = 0, totalCurrLoan = 0, totalPrincPaid = 0, totalInvestors = 0;
  const props = getFilteredProperties();

  props.forEach(([_, p]) => {
    totalPP += parseFloat(p.info.purchasePrice) || 0;
    totalEq += parseFloat(p.info.totalEquity) || 0;
    totalDist += parseFloat(p.info.ltdDistributions) || 0;
    totalLoan += parseFloat(p.info.origLoan) || 0;
    totalCurrLoan += parseFloat(p.info.currentLoan) || 0;
    totalPrincPaid += parseFloat(p.info.ltdPrincipalPaid) || 0;
    totalInvestors += parseInt(p.info.investors) || 0;
    const noi = calcNOI(p.financials);
    if (noi !== null) totalNOI += noi;
  });

  const portfolioDPI = totalEq > 0 ? (totalDist / totalEq).toFixed(2) + 'x' : '—';

  let html = `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Acquisition Cost</div>
        <div class="stat-value" style="font-size: 24px;">${formatMoney(totalPP)}</div>
        <div class="stat-sub">${props.length} properties</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Equity Raised</div>
        <div class="stat-value" style="font-size: 24px;">${formatMoney(totalEq)}</div>
        <div class="stat-sub">${totalInvestors} investors</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">LTD Distributions</div>
        <div class="stat-value" style="font-size: 24px;">${formatMoney(totalDist)}</div>
        <div class="stat-sub ${parseFloat(portfolioDPI) >= 1 ? 'positive' : ''}">${portfolioDPI} portfolio MOIC</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Outstanding Debt</div>
        <div class="stat-value" style="font-size: 24px;">${formatMoney(totalCurrLoan)}</div>
        <div class="stat-sub">${formatMoney(totalPrincPaid)} principal paid</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><h3>Investment Performance by Property</h3></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Property</th>
              <th>Acq Date</th>
              <th>Hold</th>
              <th>Units</th>
              <th>Purchase Price</th>
              <th>$/Unit</th>
              <th>Equity</th>
              <th>LTD Dist</th>
              <th>MOIC</th>
              <th>Curr Loan</th>
            </tr>
          </thead>
          <tbody>
  `;

  // Sort by DPI descending
  const sorted = props.slice().sort(([_, a], [__, b]) => {
    const dpiA = (parseFloat(a.info.totalEquity) || 0) > 0 ? (parseFloat(a.info.ltdDistributions) || 0) / parseFloat(a.info.totalEquity) : 0;
    const dpiB = (parseFloat(b.info.totalEquity) || 0) > 0 ? (parseFloat(b.info.ltdDistributions) || 0) / parseFloat(b.info.totalEquity) : 0;
    return dpiB - dpiA;
  });

  sorted.forEach(([id, p]) => {
    const acq = p.info.acquisitionDate ? new Date(p.info.acquisitionDate) : null;
    const holdYears = acq ? ((today - acq) / (1000 * 60 * 60 * 24 * 365.25)).toFixed(1) + 'y' : '—';
    const pp = parseFloat(p.info.purchasePrice) || 0;
    const eq = parseFloat(p.info.totalEquity) || 0;
    const dist = parseFloat(p.info.ltdDistributions) || 0;
    const units = parseInt(p.info.units) || 0;
    const ppPerUnit = units > 0 ? pp / units : 0;
    const dpi = eq > 0 ? dist / eq : 0;
    const currLoan = parseFloat(p.info.currentLoan) || 0;
    const dpiClass = dpi >= 1 ? 'positive' : (dpi >= 0.5 ? '' : 'negative');

    html += `
      <tr style="cursor: pointer;" onclick="selectProperty('${id}')">
        <td><strong>${p.info.name}</strong><br><span style="color: #64748b; font-size: 11px;">${p.info.group}</span></td>
        <td>${p.info.acquisitionDate || '—'}</td>
        <td>${holdYears}</td>
        <td>${units || '—'}</td>
        <td>${formatMoney(pp)}</td>
        <td>${formatMoney(ppPerUnit)}</td>
        <td>${formatMoney(eq)}</td>
        <td>${formatMoney(dist)}</td>
        <td class="stat-sub ${dpiClass}"><strong>${eq > 0 ? dpi.toFixed(2) + 'x' : '—'}</strong></td>
        <td>${formatMoney(currLoan)}</td>
      </tr>
    `;
  });

  html += `
        <tr style="background: #0f172a; font-weight: 700;">
          <td colspan="4">PORTFOLIO TOTAL</td>
          <td>${formatMoney(totalPP)}</td>
          <td>—</td>
          <td>${formatMoney(totalEq)}</td>
          <td>${formatMoney(totalDist)}</td>
          <td class="stat-sub ${parseFloat(portfolioDPI) >= 1 ? 'positive' : ''}">${portfolioDPI}</td>
          <td>${formatMoney(totalCurrLoan)}</td>
        </tr>
        </tbody></table></div>
    </div>
  `;
  document.getElementById('main-content').innerHTML = html;
}

// Import/Export
// Bulk monthly update functions
function getDefaultBulkPeriod() {
  // Default to the latest period across all properties + 1 month, or current month
  let latestPeriod = '';
  Object.values(state.properties).forEach(p => {
    p.financials.forEach(f => {
      if (f.period > latestPeriod) latestPeriod = f.period;
    });
  });
  if (!latestPeriod) {
    const today = new Date();
    return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
  }
  // Add one month
  const [y, m] = latestPeriod.split('-').map(Number);
  const next = new Date(y, m, 1);
  return `${next.getFullYear()}-${String(next.getMonth() + 1).padStart(2, '0')}`;
}

function toggleBulkPaste() {
  const sec = document.getElementById('bulk-paste-section');
  sec.style.display = sec.style.display === 'none' ? 'block' : 'none';

    Object.keys(state.properties).forEach(id => {

function parsePasteData() {
  const text = document.getElementById('bulk-paste-text').value.trim();
  if (!text) {
    alert('Paste some data first.');
    return;
  }
  const lines = text.split('\n').filter(l => l.trim());
  const nameToId = {};
  Object.entries(state.properties).forEach(([id, p]) => {
    nameToId[p.info.name.toLowerCase().trim()] = id;
  });

  let matched = 0, unmatched = [];
  lines.forEach(line => {
    // Split by tab or multiple spaces
    const parts = line.split(/\t|  +/).map(s => s.trim()).filter(s => s);
    if (parts.length < 2) return;
    const name = parts[0].toLowerCase();
    const id = nameToId[name];
    if (!id) {
      // Try fuzzy match — find a property whose name starts with the pasted name or vice versa
      const fuzzy = Object.entries(state.properties).find(([_, p]) => {
        const pn = p.info.name.toLowerCase();
        return pn.includes(name) || name.includes(pn);
      });
      if (fuzzy) {
        const [fid] = fuzzy;
        applyParsedRow(fid, parts);
        matched++;
      } else {
        unmatched.push(parts[0]);
      }
    } else {
      applyParsedRow(id, parts);
      matched++;
    }
  });

  // Trigger NOI updates
  Object.keys(state.properties).forEach(id => {
    const inc = document.getElementById(`bulk-inc-${id}`);
    if (inc) inc.dispatchEvent(new Event('input'));
  });

  let msg = `Parsed ${matched} row${matched !== 1 ? 's' : ''} into the table.`;
  if (unmatched.length > 0) msg += `\n\nCould not match: ${unmatched.join(', ')}\n\nProperty names must match exactly. Available names: ${Object.values(state.properties).map(p => p.info.name).join(', ')}`;
  alert(msg);
}

function applyParsedRow(id, parts) {
  const incEl = document.getElementById(`bulk-inc-${id}`);
  const expEl = document.getElementById(`bulk-exp-${id}`);
  const budEl = document.getElementById(`bulk-bud-${id}`);
  if (parts[1]) incEl.value = parts[1].replace(/[$,]/g, '');
  if (parts[2]) expEl.value = parts[2].replace(/[$,]/g, '');
  if (parts[3] && !isNaN(parseFloat(parts[3].replace(/[$,]/g, '')))) {
    budEl.value = parts[3].replace(/[$,]/g, '');
  }
}

async function applyBulkUpdate() {
  const period = document.getElementById('bulk-period').value;
  if (!period) {
    alert('Please select a period (month).');
    return;
  }
  const mode = document.getElementById('bulk-mode').value;
  let updated = 0, added = 0, skipped = 0, blank = 0;
  const summary = [];

  getFilteredProperties().forEach(([id, p]) => {
    const incVal = document.getElementById(`bulk-inc-${id}`).value;
    const expVal = document.getElementById(`bulk-exp-${id}`).value;
    const budVal = document.getElementById(`bulk-bud-${id}`).value;
    const noteVal = document.getElementById(`bulk-note-${id}`).value;

    if (!incVal && !expVal) {
      blank++;
      return;
    }

    const existing = p.financials.find(f => f.period === period);
    if (existing) {
      if (mode === 'skip') {
        skipped++;
        summary.push(`${p.info.name}: skipped (existing entry kept)`);
        return;
      }
      existing.income = incVal || '0';
      existing.expenses = expVal || '0';
      if (budVal) existing.budgetNOI = budVal;
      if (noteVal) existing.notes = noteVal;
      updated++;
      summary.push(`${p.info.name}: updated`);
    } else {
      p.financials.push({
        period,
        income: incVal || '0',
        expenses: expVal || '0',
        budgetNOI: budVal || '',
        notes: noteVal || ''
      });
      // Keep financials sorted by period
      p.financials.sort((a, b) => a.period.localeCompare(b.period));
      added++;
      summary.push(`${p.info.name}: added`);
    }
  });

  if (updated + added === 0) {
    alert('No values entered. Type or paste numbers into the table first.');
    return;
  }

  await saveData();
  clearBulkPaste();
  document.getElementById('bulk-paste-section').style.display = 'none';
  render();

  let msg = `✓ ${period} updated successfully.\n\n`;
  if (added > 0) msg += `Added: ${added}\n`;
  if (updated > 0) msg += `Updated: ${updated}\n`;
  if (skipped > 0) msg += `Skipped (existing): ${skipped}\n`;
  if (blank > 0) msg += `Blank (no entry made): ${blank}\n`;
  alert(msg);
}

function exportData() {
  const data = JSON.stringify(state.properties, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rockstar-portfolio-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      // Detect patch mode (partial update) vs full replace
      if (imported._patch_mode === true) {
        const desc = imported._patch_description || 'Apply targeted updates to specific properties';
        const propertyIds = Object.keys(imported).filter(k => !k.startsWith('_'));
        const propertyNames = propertyIds.map(id => state.properties[id]?.info?.name || id).join(', ');
        if (!confirm(`PATCH UPDATE\n\n${desc}\n\nProperties affected: ${propertyNames}\n\nThis will only modify the specific fields listed in the patch — all other data is preserved.\n\nApply?`)) return;
        applyPatch(imported);
        await saveData();
        render();
        alert(`✓ Patch applied successfully.\n\nUpdated ${propertyIds.length} ${propertyIds.length === 1 ? 'property' : 'properties'}.`);
      } else {
        // Full replace import
        if (!confirm('FULL IMPORT\n\nThis will REPLACE all current data with the imported file.\n\nAll your edits will be overwritten. Continue?')) return;
        state.properties = imported;
        await saveData();
        render();
        alert('Data imported successfully.');
      }
    } catch (err) {
      alert('Failed to import: ' + err.message);
    }
    // Clear the input so the same file can be imported again if needed
    event.target.value = '';
  };
  reader.readAsText(file);
}

// Apply a patch file (partial update) to state.properties
function applyPatch(patch) {
  Object.keys(patch).forEach(key => {
    if (key.startsWith('_')) return;  // Skip metadata keys
    const propertyData = patch[key];
    if (!state.properties[key]) {
      console.warn(`Patch references unknown property: ${key}`);
      return;
    }
    if (propertyData.info_updates) {
      Object.assign(state.properties[key].info, propertyData.info_updates);
    }
    // Future: support adding/updating financials, occupancy, walks, actions
  });
}

// Init
loadData();
</script>
